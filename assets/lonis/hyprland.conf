monitor=,preferred,auto,1

env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = GDK_BACKEND,wayland,x11

$mod = SUPER
$terminal = kitty
$menu = rofi -show drun
$fileManager = xdg-open ~

exec-once = waybar
exec-once = nm-applet --indicator
exec-once = dunst

input {
    kb_layout = __ABORA_KB_LAYOUT__
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = yes
        tap-to-click = yes
        scroll_factor = 0.9
    }
}

general {
    gaps_in = 6
    gaps_out = 18
    border_size = 2
    col.active_border = rgba(5aa9ffff)
    col.inactive_border = rgba(2a3442ff)
    layout = dwindle
    resize_on_border = true
    allow_tearing = false
}

decoration {
    rounding = 14

    blur {
        enabled = true
        size = 8
        passes = 2
        new_optimizations = true
    }

    shadow {
        enabled = true
        range = 18
        render_power = 3
        color = rgba(04070dcc)
    }
}

animations {
    enabled = yes
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    animation = windows, 1, 6, easeOutQuint
    animation = border, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, easeOutQuint
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

gesture {
    workspace_swipe = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

windowrulev2 = float,class:^(pavucontrol)$
windowrulev2 = float,class:^(nm-connection-editor)$
windowrulev2 = float,class:^(org\.gnome\.Calculator)$

bind = $mod, RETURN, exec, $terminal
bind = $mod, D, exec, $menu
bind = $mod, E, exec, $fileManager
bind = $mod, B, exec, kitty -e fastfetch
bind = $mod, V, togglefloating,
bind = $mod, F, fullscreen,
bind = $mod SHIFT, Q, killactive,
bind = $mod SHIFT, E, exit,
bind = $mod, SPACE, exec, pavucontrol
bind = $mod, PRINT, exec, grim -g "$(slurp)" - | wl-copy
bind = , PRINT, exec, grim - | wl-copy
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d
bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, down, movewindow, d
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
