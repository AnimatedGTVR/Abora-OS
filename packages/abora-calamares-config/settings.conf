# Placeholder Calamares settings for a future Abora GUI installer.
# This is not active in the current ISO build yet.

modules-search: [ local ]
sequence:
  - show:
    - welcome
    - locale
    - keyboard
    - partition
    - users
    - summary
  - exec:
    - partition
    - mount
    - unpackfs
    - machineid
    - fstab
    - locale
    - keyboard
    - localecfg
    - users
    - displaymanager
    - networkcfg
    - umount
branding: abora
