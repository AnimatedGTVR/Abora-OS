name: Build Abora ISO

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "nix/**"
      - "scripts/**"
      - "VERSION"
      - "assets/wallpaper.png"
      - "flake.nix"
      - ".github/workflows/build-iso.yml"

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read version
        id: version
        run: echo "value=$(tr -d '\n' < VERSION)" >> "$GITHUB_OUTPUT"

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21

      - name: Verify Nix + Flake
        env:
          NIX_CONFIG: experimental-features = nix-command flakes
        run: |
          set -euxo pipefail
          which nix
          nix --version
          nix flake show --no-write-lock-file .

      - name: Build ISO
        env:
          NIX_CONFIG: experimental-features = nix-command flakes
        run: ./scripts/build-iso.sh

      - name: Show output files
        run: ls -lah out

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v7
        with:
          name: abora-${{ steps.version.outputs.value }}-${{ github.run_number }}
          path: |
            out/*.iso
            out/SHA256SUMS-*.txt
          if-no-files-found: error
